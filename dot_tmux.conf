# ── Terminal & Colors ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true color
set -ag terminal-overrides ",*:Tc"                 # true color fallback
set -ag terminal-overrides ",*:U8=0"               # fix undercurls in nvim

# ── Critical for nvim ──────────────────────────────────────────────────────────
set -sg escape-time 0          # no ESC delay (nvim mode switching feels instant)
set -g focus-events on         # lets nvim trigger autoread on focus
set -g mouse on

# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Vim-style pane navigation (works with vim-tmux-navigator in nvim) ─────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

bind -n C-\\ if-shell "$is_vim" "send-keys C-\\\\" "select-pane -l"

# Same bindings in copy mode
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# ── Pane management ────────────────────────────────────────────────────────────
bind q kill-pane

# ── Pane splitting ─────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"   # new windows keep cwd

# ── Vim-style copy mode ────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Window / pane numbering ────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Misc ───────────────────────────────────────────────────────────────────────
set -g history-limit 50000
set -g display-time 1500
set -g status-interval 5
set -g set-clipboard on         # OSC 52 clipboard (nvim yank → system clipboard)
